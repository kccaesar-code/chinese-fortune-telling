        // 計算八字
        function calculateBazi(year, month, day, hour) {
            // 簡化的八字計算邏輯（實際八字計算更複雜）
            const yearIndex = (year - 4) % 10;
            const monthIndex = (month - 1) % 12;
            const dayIndex = (day - 1) % 10;
            const hourIndex = hour ? parseInt(hour.split('-')[0]) % 12 : 0;

            return {
                yearStem: heavenlyStems[yearIndex],
                yearBranch: earthlyBranches[yearIndex % 12],
                monthStem: heavenlyStems[monthIndex],
                monthBranch: earthlyBranches[monthIndex],
                dayStem: heavenlyStems[dayIndex],
                dayBranch: earthlyBranches[dayIndex % 12],
                hourStem: heavenlyStems[hourIndex],
                hourBranch: earthlyBranches[hourIndex]
            };
        }

        // 獲取生肖
        function getZodiac(year) {
            return zodiacAnimals[(year - 4) % 12];
        }

        // 獲取五行
        function getFiveElement(stem) {
            const index = heavenlyStems.indexOf(stem);
            return fiveElements[index];
        }

        // 隨機選擇分析內容
        function getRandomAnalysis(dataArray) {
            return dataArray[Math.floor(Math.random() * dataArray.length)];

                alert('請填寫完整的出生信息和性別！');
                return;

            // 計算八字
            const bazi = calculateBazi(year, month, day, hour);
            const zodiac = getZodiac(year);
            const mainElement = getFiveElement(bazi.dayStem);

            // 顯示出生信息
            document.getElementById('birthInfo').textContent =

                { label: '月柱', stem: bazi.monthStem, branch: bazi.monthBranch },
                { label: '日柱', stem: bazi.dayStem, branch: bazi.dayBranch },
                { label: '時柱', stem: bazi.hourStem, branch: bazi.hourBranch }
            ];

            baziItems.forEach(item => {
                const element = getFiveElement(item.stem);
                const colorIndex = fiveElements.indexOf(element);
                const color = fiveElementColors[colorIndex];

                const div = document.createElement('div');
                div.className = 'bazi-item';
                div.style.background = color;
                div.innerHTML = `
                    ${item.stem}${item.branch}
                    <span class="bazi-label">${item.label}</span>
                `;
                baziGrid.appendChild(div);
            });

        // 重置表單
        function resetForm() {
            document.getElementById('year').value = '';
            document.getElementById('month').value = '';
            document.getElementById('day').value = '';
            document.getElementById('hour').value = '';
            document.querySelectorAll('input[name="gender"]').forEach(input => {
                input.checked = false;
            });
            document.getElementById('resultSection').style.display = 'none';
            
            // 重置日期選項
            const daySelect = document.getElementById('day');
            daySelect.innerHTML = '<option value="">選擇日期</option>';
            for (let day = 1; day <= 31; day++) {
                const option = document.createElement('option');
                option.value = day;
                option.textContent = `${day}日`;
                daySelect.appendChild(option);
            }
        }

        // 初始化頁面
        window.onload = function() {
            // 設置默認年份為1990
            document.getElementById('year').value = 1990;
            updateDays();
