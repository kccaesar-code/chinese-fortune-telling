<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>簡單八字算命</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        select, button { padding: 10px; margin: 5px; font-size: 16px; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>八字算命</h1>
        
        <div>
            <label>出生年份:</label>
            <select id="year">
                <option value="">選擇年份</option>
            </select>
        </div>
        
        <div>
            <label>出生月份:</label>
            <select id="month">
                <option value="">選擇月份</option>
            </select>
        </div>
        
        <div>
            <label>出生日期:</label>
            <select id="day">
                <option value="">選擇日期</option>
            </select>
        </div>
        
        <div>
            <label>性別:</label>
            <input type="radio" name="gender" id="male" value="male"> 男
            <input type="radio" name="gender" id="female" value="female"> 女
        </div>
        
        <button id="calculateBtn">開始算命</button>
        
        <div class="result" id="result" style="display:none;">
            <h3>算命結果</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script>
        // 初始化選項
        function initOptions() {
            console.log('初始化開始...');
            
            // 年份 (1900-2026)
            const yearSelect = document.getElementById('year');
            for (let year = 1900; year <= 2026; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year + '年';
                yearSelect.appendChild(option);
            }
            
            // 月份 (1-12)
            const monthSelect = document.getElementById('month');
            for (let month = 1; month <= 12; month++) {
                const option = document.createElement('option');
                option.value = month;
                option.textContent = month + '月';
                monthSelect.appendChild(option);
            }
            
            // 日期 (1-31)
            const daySelect = document.getElementById('day');
            for (let day = 1; day <= 31; day++) {
                const option = document.createElement('option');
                option.value = day;
                option.textContent = day + '日';
                daySelect.appendChild(option);
            }
            
            // 設置默認值
            yearSelect.value = 1990;
            monthSelect.value = 1;
            document.getElementById('male').checked = true;
            
            console.log('初始化完成');
        }
        
        // 計算命運
        function calculate() {
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            const gender = document.querySelector('input[name="gender"]:checked');
            
            if (!year || !month || !day || !gender) {
                alert('請填寫完整信息！');
                return;
            }
            
            // 簡單的算命邏輯
            const zodiacs = ['鼠', '牛', '虎', '兔', '龍', '蛇', '馬', '羊', '猴', '雞', '狗', '豬'];
            const zodiacIndex = (parseInt(year) - 4) % 12;
            const zodiac = zodiacs[zodiacIndex >= 0 ? zodiacIndex : zodiacIndex + 12];
            
            const fortunes = [
                '今年運勢不錯，事業有發展機會。',
                '感情方面需要多溝通，增進了解。',
                '財運亨通，適合投資理財。',
                '健康方面要注意飲食規律。',
                '有貴人相助，事業上有突破。',
                '適合學習新技能，提升競爭力。'
            ];
            
            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            
            document.getElementById('resultText').textContent = 
                `您的生肖是${zodiac}。${randomFortune}`;
            document.getElementById('result').style.display = 'block';
        }
        
        // 頁面加載時初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加載完成，開始初始化');
            initOptions();
            
            // 綁定按鈕事件
            document.getElementById('calculateBtn').addEventListener('click', calculate);
            
            console.log('頁面準備就緒');
        });
        
        // 備用初始化
        window.onload = function() {
            console.log('頁面完全加載');
        };
    </script>
</body>
</html>
